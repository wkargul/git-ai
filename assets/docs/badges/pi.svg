<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="430" height="100">
  <defs>
    <clipPath id="clip-pi">
      <rect width="430" height="100" rx="12" ry="12"/>
    </clipPath>
    <linearGradient id="green-pi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="gray-pi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3F4F6"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <filter id="shadow-pi" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <g clip-path="url(#clip-pi)" filter="url(#shadow-pi)">
    <rect width="330" height="100" fill="url(#gray-pi)"/>
    <rect x="330" width="100" height="100" fill="url(#green-pi)"/>
  </g>
  <image x="2" y="2" width="326" height="96" xlink:href="data:image/svg+xml;base64,"/>
  <polyline points="368,50 376,62 394,38" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="330" y1="0" x2="330" y2="100" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect width="430" height="100" rx="12" ry="12" fill="none" stroke="#9CA3AF" stroke-width="3"/>
</svg>
