name: Perf Instrumentation Probe

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Integration test filter (space-separated module names)"
        required: false
        default: "cherry_pick"

jobs:
  perf-probe:
    name: Perf probe (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-perf-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-perf-
            ${{ runner.os }}-cargo-

      # Compile the test binary separately so the perf log only contains
      # test execution output, not cargo's compilation progress.
      - name: Build test binary
        run: cargo test --no-run --test integration
        env:
          CARGO_INCREMENTAL: "0"

      # Run the selected integration tests with perf instrumentation enabled.
      # The filter defaults to cherry_pick because that is where Patch 2
      # (batch notes writes) has the most impact: each multi-commit cherry-pick
      # previously spawned 2×N git subprocesses for notes; after the fix it
      # spawns exactly 2 regardless of N.
      #
      # continue-on-error is set because _in_worktree variants are pre-existing
      # failures on macOS/Linux worktree setups and do not affect the perf data.
      # The [git-ai perf] report is printed by libc::atexit inside each
      # subprocess and by the test binary itself, so the artifact is always
      # useful even when individual tests fail.
      - name: Run perf probe
        shell: bash
        continue-on-error: true
        run: |
          cargo test --package git-ai --test integration \
            -- --test-threads=1 ${{ inputs.test_filter }} \
            --nocapture 2>&1 | tee perf.log
        env:
          GIT_AI_DEBUG_PERFORMANCE: "1"
          GIT_AI_TEST_GIT_MODE: wrapper
          CARGO_INCREMENTAL: "0"

      - name: Upload perf.log
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: perf-log-${{ matrix.os }}
          path: perf.log
          if-no-files-found: warn
