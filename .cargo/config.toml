# Use mold linker on Linux for significantly faster linking (2-10x).
# Install mold: apt-get install mold (Ubuntu) or dnf install mold (Fedora).
# Falls back to default linker if mold is not available.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
